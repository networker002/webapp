<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание 📅</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        :root {
            --main-bg-color: linear-gradient(-180deg, #05050a, #000);
        }

        @font-face {
            font-family: "DejaVuSans";
            src: url(../services/DejaVu\ Sans/DejaVuSans.ttf);
        }

        body {
            min-height: 100vh;
            background: var(--main-bg-color);
            color: #fff;
            font-family: "DejaVuSans";
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1em;
            padding: .5em;
            padding-top: 2em;
            background:#4f6187;
        }

        .days {
            ul {
                display: flex;
                justify-content: center;
                list-style: none;
                margin: 1em;
                gap: 5vw;

                li {
                    background-color: #10244e;
                    padding: 6px;
                    border-radius: .5em;
                    transition: scale .1s, background .25s ease, padding .5s ease;
                    cursor: pointer;

                    &:active {
                        scale: .9;
                    }
                }
            }
        }

        .days .selected {
            background-color: rgb(0, 200, 200);
            filter: drop-shadow(1px 1px .5em #ffffff34);
            padding: 6px 12px;
        }

        .day {
            display: none;
            background: #4f618738;
            border-radius: 2em;
            padding: .5em;
            padding-bottom: 1em;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            padding-left: 1em;
            padding-right: 1em;
            margin-left: 1em;
            margin-right: 1em;

            .day-name {
                text-align: center;
                padding: 4px;
                letter-spacing: 1px;

                &::before {
                    content: "📆";
                }
            }

        }
        .lesson {
            margin-top: 1em;
            padding-top: 1em;
            border-top: 2px solid #ffffff13;

        }

        .time {
            color: #bdc6db;
            letter-spacing: 1px;
            font-family: monospace;
            font-size: larger;
            padding-top: .2em;
            padding-bottom: .25em;
        }

        #gr {
            text-align: center;
            margin: 2em;
            letter-spacing: 2px;
            color: #79ceff;
            font-weight: 800;
        }

        #loader  {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            margin: auto;
            justify-content: center;
            align-items: center;
            gap: 1em;
            z-index: 1000;
            background: #000000c0;
            min-height: 100vh;
            min-width: 100vw;
            pointer-events: none;
            user-select: none;
            overflow: hidden;
        }

        @keyframes scale1 {
            50% {
                scale: .75;
            }
        }

        #loader div {
            position: relative;
            font-size: 10vw;
            text-align: center;
            color: transparent;
            background: linear-gradient(90deg, rgb(0, 255, 106), rgb(0, 89, 255));
            background-clip: text;
            filter: drop-shadow(1px 2px .1em #ffffff44);

            &:first-child {
                animation: scale1 2s infinite;
            }

            &:nth-child(2) {
                animation: scale1 2s infinite;
                animation-delay: 1s;
            }

            &:last-child {
                animation: scale1 2s infinite;
            }
        }

    </style>

    <div id="loader"><div>●</div><div>●</div><div>●</div></div>

    <header>
        <h1>Расписание занятий</h1>
        <h5 id="date-time"></h5>
    </header>

    <main>
        <div class="days">
            <ul>
                <li class="btnD">ПН</li>
                <li class="btnD">ВТ</li>
                <li class="btnD">СР</li>
                <li class="btnD">ЧТ</li>
                <li class="btnD">ПТ</li>
                <li class="btnD">СБ</li>
            </ul>
        </div>

        <div id="gr"></div>

        <div id="schedule-container">

        </div>
    </main>

    <script>
        var loader = document.getElementById("loader");
        loader.style.display = "flex";

        const tg = window.Telegram.WebApp;
        tg.ready();

        var d = new Date();
        n = d.getDay();
        m = d.getMonth();
        dt = d.getDate();
        days = {1:"Понедельник", 2:"Вторник", 3:"Среда", 4:"Четверг", 5:"Пятница", 6:"Суббота", 7:"Воскресенье"}, months = {0:"января", 1:"февраля", 2:"марта", 3:"апреля", 4:"мая", 5:"июня", 6:"июля", 7:"августа", 8:"сентября", 9:"октября", 10:"ноября", 11:"декабря"}, dayCall = days[n] ?? "Воскресенье", full = dayCall + ", " + dt + " " + (months[m] ?? 0);
        document.getElementById("date-time").innerHTML = full;
        daysShort = {1:"ПН", 2:"ВТ", 3:"СР", 4:"ЧТ", 5:"ПТ", 6:"СБ", 7:"ВС"}
        let s = false;
        let nowBtn;


    
    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        var userId = tg.initDataUnsafe.user.id;
    };

    if (userId) {
    fetch("http://127.0.0.1:8000/group/" + userId)
        .then((response) => {
            if (!response.ok) throw new Error('Error: ' + response.status);
            return response.text(); 
        })
        .then((userGroup) => {
            if (localStorage.getItem("userGroup") !== userGroup) {
                localStorage.setItem("userGroup", userGroup);
            }
            document.getElementById("gr").innerHTML = "Группа: " + userGroup;

            return fetch("http://127.0.0.1:8000/schedule/" + userGroup);
        })
        .then((resp) => {
            if (resp && resp.ok) {
                loader.style.display = "none";
                return resp.json();
            }
        })
        .then((data) => {
            if (data) {
                const container = document.getElementById("schedule-container");
                container.innerHTML = data;
                if (nowBtn) upsSV();
            }
        })
            .catch(err => {
                console.error("Ошибка:", err);
                loader.style.display = "none";
            });
        } else {
            console.warn("userId не определен, запрос отменен.");
            loader.style.display = "none";
        }
        function upsSV(){
                var DAYS = document.querySelectorAll(".day");
                
                DAYS.forEach((de) => {
                    de.style.display = "none";
                    btnMapping = {"ПН":"Понедельник", "ВТ":"Вторник", "СР": "Среда", "ЧТ": "Четверг", "ПТ": "Пятница", "СБ": "Суббота"};
                    if (de.querySelector(".day-name")?.innerHTML === btnMapping[nowBtn.innerHTML]) {
                        de.style.display = "block";
                    } else {de.style.display = "none";}
            });
            }

        var btns = document.querySelectorAll(".btnD");
        btns.forEach((btn) => {
            if (btn.innerHTML === daysShort[n]) {
                btn.classList.add("selected");
                nowBtn = btn;
                s = true;
            }
            btn.addEventListener("click", function() {
                if (s) {nowBtn.classList.remove("selected")}
                btn.classList.add("selected");
                nowBtn = btn;
                upsSV();
            });
        });

    </script>
</body>
</html>
