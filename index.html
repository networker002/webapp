<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание 📅</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        :root {
            --main-bg-color: linear-gradient(-180deg, #05050a, #000);
        }

        @font-face {
            font-family: "DejaVuSans";
            src: url(../services/DejaVu\ Sans/DejaVuSans.ttf);
        }

        body {
            min-height: 100vh;
            background: var(--main-bg-color);
            color: #fff;
            font-family: "DejaVuSans";
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1em;
            padding: .5em;
            background:#4f6187;
        }

        .days {
            ul {
                display: flex;
                justify-content: center;
                list-style: none;
                margin: 1em;
                gap: 5vw;

                li {
                    background-color: #10244e;
                    padding: 6px;
                    border-radius: .5em;
                    transition: scale .1s, background .2s ease, padding .5s ease;
                    cursor: pointer;

                    &:active {
                        scale: .9;
                    }
                }
            }
        }

        .days .selected {
            background-color: rgb(0, 200, 200);
            filter: drop-shadow(1px 1px .5em #ffffff34);
            /*padding: 6px 12px;*/
        }

        .day {
            display: none;
            background: #4f618738;
            border-radius: 2em;
            padding: .5em;
            padding-bottom: 1em;

            .day-name {
                text-align: center;
                padding: 4px;
            }

        }
        .lesson {
            margin-top: 1em;
            padding-top: 1em;
            border-top: 2px solid #ffffff33;

        }


    </style>

    <header>
        <h1>Расписание занятий</h1>
        <h5 id="date-time"></h5>
    </header>

    <main>
        <div class="days">
            <ul>
                <li class="btnD">ПН</li>
                <li class="btnD">ВТ</li>
                <li class="btnD">СР</li>
                <li class="btnD">ЧТ</li>
                <li class="btnD">ПТ</li>
                <li class="btnD">СБ</li>
            </ul>
        </div>

        <div id="schedule-container">

        </div>
    </main>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        var d = new Date();
        n = d.getDay();
        m = d.getMonth();
        dt = d.getDate();
        days = {1:"Понедельник", 2:"Вторник", 3:"Среда", 4:"Четверг", 5:"Пятница", 6:"Суббота", 7:"Воскресенье"}, months = {0:"января", 1:"февраля", 2:"марта", 3:"апреля", 4:"мая", 5:"июня", 6:"июля", 7:"августа", 8:"сентября", 9:"октября", 10:"ноября", 11:"декабря"}, dayCall = days[n] ?? "Воскресенье", full = dayCall + ", " + dt + " " + (months[m] ?? 0);
        document.getElementById("date-time").innerHTML = full;
        daysShort = {1:"ПН", 2:"ВТ", 3:"СР", 4:"ЧТ", 5:"ПТ", 6:"СБ", 7:"ВС"}
        let s = false;
        let nowBtn;


    
    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        var userId = tg.initDataUnsafe.user.id;
    };

    if (userId) {
    fetch("http://127.0.0.1:8000/group/" + userId)
        .then((response) => {
            if (!response.ok) throw new Error('Error: ' + response.status);
            var userGroup = response.text();
            return userGroup;
        })
        //.then((userGroup) => {
        //    console.log("Группа пользователя:", userGroup);
        //})

        .catch(err => console.error("Ошибка запроса группы:", err));
} else {
    console.warn("userId не определен, запрос отменен.");

}

    
    fetch("http://127.0.0.1:8000/schedule/ИС-25-14О")
        .then((resp) => {
            if (!resp.ok){
                throw new Error('HTTP error: ${response.status}');
                
            }
            return resp.json();
        })
        .then((data) => {
            //console.log(data);

            const container = document.getElementById("schedule-container");

            if (container) {
                container.innerHTML = data;
        }
        })
        .catch(err => console.error("Ошибка расписания:", err));

        function upsSV(){
                var DAYS = document.querySelectorAll(".day");
                
                DAYS.forEach((de) => {
                    de.style.display = "none";
                    btnMapping = {"ПН":"Понедельник", "ВТ":"Вторник", "СР": "Среда", "ЧТ": "Четверг", "ПТ": "Пятница", "СБ": "Суббота"};
                    if (de.querySelector(".day-name")?.innerHTML === "📅"+ btnMapping[nowBtn.innerHTML]) {
                        de.style.display = "block";
                    } else {de.style.display = "none";}
            });
            }

        var btns = document.querySelectorAll(".btnD");
        btns.forEach((btn) => {
            if (btn.innerHTML === daysShort[n]) {
                btn.classList.add("selected");
                nowBtn = btn;
                s = true;
            }
            btn.addEventListener("click", function() {
                if (s) {nowBtn.classList.remove("selected")}
                btn.classList.add("selected");
                nowBtn = btn;
                upsSV();
            });
        });

    </script>
</body>
</html>
