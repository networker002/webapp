<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Расписание 📅</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
</head>

<body>
    <svg style="display:none;">
        <defs>
            <g id="handle" stroke-width="2" fill="#fff" stroke="#000">
                <g transform="translate(-2.000000, 0.000000)">
                    <path d="M11.5201888,0.98376551 C13.6952297,0.98376551 15.8701457,1.81608292 17.5295957,3.48022772 C19.1901518,5.14549409 20.0201888,7.32814902 20.0201888,9.51067916 C20.0201888,11.5892784 19.2673214,13.6679882 17.7611695,15.299761 L17.529597,15.541119 L16.751934,16.320985 L16.3895078,16.6844379 L15.7908391,17.2848025 L11.5201888,21.5675509 L6.56546871,16.5987948 L6.06410518,16.096011 C4.16105924,14.1875741 3.18084887,11.8968269 3.09234842,9.65314602 C3.00270091,7.38038455 3.8309449,5.16482966 5.5107793,3.48023034 C7.17023192,1.81608292 9.34514792,0.98376551 11.5201888,0.98376551 Z M11.5,6 C10.5335017,6 9.65850169,6.39175084 9.02512627,7.02512627 C8.39175084,7.65850169 8,8.53350169 8,9.5 C8,10.4664983 8.39175084,11.3414983 9.02512627,11.9748737 C9.65850169,12.6082492 10.5335017,13 11.5,13 C12.4664983,13 13.3414983,12.6082492 13.9748737,11.9748737 C14.6082492,11.3414983 15,10.4664983 15,9.5 C15,8.53350169 14.6082492,7.65850169 13.9748737,7.02512627 C13.3414983,6.39175084 12.4664983,6 11.5,6 Z"></path>
                </g>
            </g>
        </defs>
    </svg>

    <div class="loader-container">
        <div id="loader">
            <div id="loader-c">
                <div>●</div>
                <div>●</div>
                <div>●</div>
            </div>
        </div>
    </div>

    <div class="menu-display" id="user-menu-display">
        <canvas id="canvas" width="1000" height="1000"></canvas>
        <h1>Меню</h1>
        <img src="" alt width="60" height="60">
        <h4>Айди пользователя: <span id="tg-id-menu"></span></h4>
        <h4>Группа: <span id="group-name-menu"></span><button onclick="openGroupChangeModal()"
                style="outline: none;">Изменить</button></h4>
        <div class="th-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" id="themes-btn"><path fill="currentColor" fill-rule="evenodd" d="M10.847 21.934C5.867 21.362 2 17.133 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10c0 5.157-3.283 4.733-6.086 4.37c-1.618-.209-3.075-.397-3.652.518c-.395.626.032 1.406.555 1.929a1.673 1.673 0 0 1 0 2.366c-.523.523-1.235.836-1.97.751M11.085 7a1.5 1.5 0 1 1-3 0a1.5 1.5 0 0 1 3 0M6.5 13a1.5 1.5 0 1 0 0-3a1.5 1.5 0 0 0 0 3m11 0a1.5 1.5 0 1 0 0-3a1.5 1.5 0 0 0 0 3m-3-4.5a1.5 1.5 0 1 0 0-3a1.5 1.5 0 0 0 0 3" clip-rule="evenodd"/></svg>
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" id="notify-btn"><path fill="currentColor" d="M5 19q-.425 0-.712-.288T4 18t.288-.712T5 17h1v-7q0-2.075 1.25-3.687T10.5 4.2v-.7q0-.625.438-1.062T12 2t1.063.438T13.5 3.5v.7q2 .5 3.25 2.113T18 10v7h1q.425 0 .713.288T20 18t-.288.713T19 19zm7 3q-.825 0-1.412-.587T10 20h4q0 .825-.587 1.413T12 22M3 10q-.425 0-.712-.325t-.238-.75q.2-1.875 1.05-3.488t2.175-2.812q.325-.275.738-.25t.662.375t.2.75t-.375.7q-.975.925-1.6 2.15T4.075 9q-.05.425-.35.713T3 10m18 0q-.425 0-.725-.288T19.925 9q-.2-1.425-.825-2.65T17.5 4.2q-.325-.3-.375-.7t.2-.75t.663-.375t.737.25q1.325 1.2 2.175 2.812t1.05 3.488q.05.425-.237.75T21 10"/></svg>
        </div>
        <h4>Персональный помощник <button id="activate-ai-a"></button></h4>
        <button onclick="closee('user-menu-display'); CloseBG()" id="close-btn-m">Закрыть</button>
    </div>

    <div id="themes">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" style="position: absolute; top: 1em; right: 1em; cursor: pointer;" onclick="closee('themes'); CloseBG2();"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.5" d="m8.464 15.535l7.072-7.07m-7.072 0l7.072 7.07"/></svg>
        <h4 style="margin-bottom: 20px;">Оформление:</h4>
        
        <div class="color-picker-ui">
            <div class="controls" style="display: flex; gap: 15px; align-items: center; justify-content: space-between; margin-bottom: 20px;">
                <div class="color-slots" style="display: flex; flex-direction: column; gap: 10px;">
                    <div class="color-slot active" data-index="0"></div>
                    <div class="color-slot" data-index="1"></div>
                    <div class="color-slot" data-index="2"></div>
                </div>
                <div class="info-block" style="display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-grow: 1;">
                    <div id="colorLabel" class="color-label">Основной цвет</div>
                    <input type="text" id="colorValue" class="color-value" readonly>
                </div>
            </div>

            <div id="colorPicker" class="palette-container" style="display: flex; justify-content: center; align-items: center; touch-action: none; margin-bottom: 25px;"></div>
            
            <div class="buttons-cont1" style="display: flex; flex-direction: row; justify-content: center; gap: 2em;">
                <button onclick="closee('themes'); CloseBG2();" style="background: #91919196; color: white;">Отмена</button>
                <button id="saveColorsBtn" style="background: var(--accent); color: #fff;">Сохранить</button>
            </div>
        </div>
    </div>

    <div id="alerter"></div>
    <div id="fast-alert"><h2>Обновляем данные</h2></div>
    <div id="black-bg"></div>

    <div id="event-input">
        <label>
            <h4>Добавление события</h4><br>
            <div>
            <span>Название</span>
            <input type="text" placeholder="Как назовём событие?" id="name-event"><br>
            </div>
         </label>
         <div style="position: relative;">
         <span>Время</span>
            <input type="text" id="time-event" maxlength="11" min="4" placeholder="12:00"><b id="nowtimeset1" onclick="document.getElementById('time-event').value = new Date().getHours() + ' : ' + new Date().getMinutes();">now</b><br></div>
            <div>
            <span>Дополнительно</span>
            <textarea placeholder="Заметки..." id="extra-event"></textarea><br></div>
            <div class="btbtns">
            <button id="save-event-btn" onclick="saveTeacherData()">Сохранить</button>
            <button id="cancel-event-btn" onclick="closeN('event-input'); CloseBG();">Отмена</button>
            </div>
    </div>

    <header>
        <h1>Расписание занятий</h1>
        <h5 id="date-time"></h5>
    </header>

    <main>
        <div class="second-header">
            <div class="btns" id="burger-menu" onclick='openn("user-menu-display", "flex"); document.getElementById("black-bg").style.animation = "none"; document.getElementById("black-bg").style.animation = "opq1 1s ease";document.getElementById("black-bg").style.display = "block";'><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><title>Menu-burger-horizontal SVG Icon</title><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6h18M3 12h18M3 18h18" /></svg></div>
            <div id="gr"></div>
            <div class="btns" id="upd-b"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><title>Restart SVG Icon</title><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M12 3a9 9 0 1 1-5.657 2" /><path d="M3 4.5h4v4" /></g></svg></div>
        </div>
        <div class="days">
            <ul>
                <li class="btnD">ПН</li>
                <li class="btnD">ВТ</li>
                <li class="btnD">СР</li>
                <li class="btnD">ЧТ</li>
                <li class="btnD">ПТ</li>
                <li class="btnD">СБ</li>
                <li class="btnD" style="display:none">ВС</li>
            </ul>
        </div>

        <div class="assistant">
            <div id="default-assistant"></div>
            <div id="gloomy-asistant"></div>
        </div>
        <div id="shocked-assistant" style="display:none;"></div>
        <div class="sun"></div>
        <div class="assistant-say"><div id="ctx-assistant-say"></div></div>

        <div class="swiper" id="schedule-container">
            <div class="swiper-wrapper" id="schedule-wrapper"></div>
        </div>

        <div id="unauthorized-container">
            <div id="e-c">
                <div class="sad-starry"></div>
                <h1>Ошибка загрузки</h1>
                <p class="loading-error"></p>
            </div>
        </div>
    </main>

    <script src="main.js" defer></script>
</body>
</html>
