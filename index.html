<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание 📅</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        :root {
            --over-color: #fff;
            --main-bg-color: linear-gradient(-180deg, #07070F, #05050A);
            --header-bg-color: #4f6187;
            --menu-bg: linear-gradient(70deg, rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0.125));
            --menu-color: #fff;
            --s-b-b: rgb(180, 180, 180);
            --text-shadow-c: none;
            --alert-bg: rgba(0, 200, 200, .8);
            --time-color: #bdc6db;
            --loader-filter: #ffffff44;
            --accent: #0284c7;
            --accent-bg: rgba(2, 132, 199, 0.3);
            --lessons-b-c: #ffffff13;
            --days-bg: #18294e36;
            --days-o-color: #fff;
            --header-glass: #4f61877e;
            --shadows: rgba(255, 255, 255, .25);
            --anti-shadows: rgba(0, 0, 0, .2);
            --anti-super-shadows: rgba(0, 0, 0, .7);
            --star-sh: drop-shadow(2px 4px 2em rgba(255, 231, 96, 0.63));
            --acdeac-btn: #50a1af62;
            --runner-sk: linear-gradient(90deg, #ffffff03, #ffffff12, #ffffff03);
            --rotation-line: 90deg;
            --btn-opacity: 0.55;
            --ch-room-bg: rgba(179, 163, 95, 0.3);
            --menu-bg-bg: #00000085;
        }

        [data-theme="light"] {
            --over-color: #000;
            --main-bg-color: linear-gradient(-180deg, #f0f2f5, #ffffff);
            --header-bg-color: #a2d2ff;
            --menu-bg: linear-gradient(70deg, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.25));
            --menu-color: #10002b;
            --s-b-b: rgb(180, 180, 180);
            --text-shadow-c: #c4c4c427;
            --alert-bg: rgba(0, 200, 200, .9);
            --time-color: #000000;
            --loader-filter: rgba(0, 0, 0, .2);
            --accent: #0284c7;
            --accent-bg: rgba(2, 132, 199, 0.3);
            --lessons-b-c: #0000001a;
            --days-bg: #18294e00;
            --days-o-color: #3d3d3d;
            --header-glass: #98b9ff7e;
            --shadows: rgba(0, 0, 0, .3);
            --anti-shadows: rgba(255, 255, 255, .2);
            --anti-super-shadows: rgba(255, 255, 255, .4);
            --star-sh: drop-shadow(2px 4px 4px rgba(0, 0, 0, 0.45));
            --acdeac-btn: #68a7b362;
            --runner-sk: linear-gradient(90deg, #00000003, #00000012, #00000003);
            --rotation-line: -90deg;
            --btn-opacity: 1;
            --ch-room-bg: rgba(0, 0, 0, 0.15);
            --menu-bg-bg: none;
        }

        @font-face {
            font-family: "DejaVuSans";
            src: url(DejaVuSans.ttf);
        }

        body {
            min-height: 100vh;
            background: var(--main-bg-color);
            color: var(--over-color);
            scroll-behavior: smooth;
            font-family: "DejaVuSans";
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1em;
            padding: .5em;
            background: var(--header-bg-color);
            position: sticky;
            transition: all .2s ease;
            top: 0;
            z-index: 999;
        }

        header.scrolling {
            transition: all 1s;
            background: var(--header-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all .3s ease;

        }

        .days {
            ul {
                display: flex;
                justify-content: center;
                list-style: none;
                margin: 1em;
                gap: 5vw;
                user-select: none;

                li {
                    background-color: var(--days-bg);
                    color: var(--days-o-color);
                    font-weight: 600;
                    letter-spacing: 1px;
                    padding: 6px;
                    border-radius: .5em;
                    transition: scale .1s, background .5s ease, padding .5s ease, color .5s;
                    cursor: pointer;
                    user-select: none;

                    &:active {
                        scale: .9;
                    }
                }

            }


        }

        .days .selected {
            background-color: rgb(0, 200, 200);
            filter: drop-shadow(1px 1px .5em #ffffff38);
            padding: 6px 12px;
            color: #fff;
            animation: fasttr .5s;
        }

        @keyframes fasttr {
            50% {
                transform: translateY(2px);
            }
        }


        .day {
            display: none;
            background: #4f618738;
            border-radius: 2em;
            padding: .5em;
            padding-bottom: 1em;
            font-family: "DejaVuSans";
            padding-left: 1em;
            padding-right: 1em;
            margin-left: 1em;
            margin-right: 1em;
            margin-bottom: 2em;
            margin-top: 1.25em;

            .day-name {
                text-align: center;
                padding: 4px;
                letter-spacing: 1px;
                display: flex;
                flex-direction: row-reverse;
                justify-content: center;
                margin: auto;
                gap: .25em;

                svg {
                    margin: auto 0;
                    scale: 1.25;
                }
            }

            .lesson-row {
                position: relative;
            }

            .list-btn {
                position: absolute;
                right: .5em;
                top: .5em;
                background: none;
                padding: 4px;
                border: none;
                font-size: x-large;
                transition: all .5s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity .2s ease-out;
                user-select: none;
                color: var(--header-glass);
                opacity: var(--btn-opacity);
                filter: drop-shadow(4px 8px 4px var(--anti-super-shadows));
                outline: none !important;

                &:active {
                    scale: 1.2;
                    opacity: 1;
                }
            }


            .teacher {
                font-family: "DejaVuSans";
                font-weight: 500;
                word-wrap: balance;
                padding-top: 1.2em;
                margin-top: 1.5em;
                position: relative;
                transition: all 2s;
                animation: raise 0.4s ease forwards;

                &::before {
                    position: absolute;
                    content: "ФИО преподавателя";
                    top: 0;

                    opacity: .6;
                }

                &::after {
                    position: absolute;
                    top: -.5em;
                    content: "";
                    left: 50%;
                    transform: translateX(-50%);
                    height: 2px;
                    width: 100%;
                    margin: auto;
                    background: linear-gradient(var(--rotation-line), var(--menu-color), var(--acdeac-btn));
                }
            }

        }

        .lesson {
            margin-top: 1em;
            padding-top: 1em;
            border-top: 2px solid var(--lessons-b-c);
        }

        @keyframes raise {
            0% {
                opacity: 0;
                transform: translateY(-6px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .time {
            color: var(--time-color);
            letter-spacing: 1px;
            font-family: monospace;
            font-weight: 200;
            font-size: larger;
            padding-top: .2em;
            padding-bottom: .25em;
            text-shadow: 1px 2px 4px var(--text-shadow-c);
        }

        .time.now {
            position: relative;

            &::after {
                content: "";
                position: absolute;
                height: 10px;
                width: 10px;
                top: 50%;
                transform: translateY(-60%);
                background: #85ff15;
                border-radius: 50%;
                margin-left: .5em;
                animation: active 2s infinite;
                opacity: .8;
            }
            
        }
        
        
        .isNow {
            position: relative;
            animation: activeNoScale 2s infinite;

            &::after{
                content: "";
                position: absolute;
                height: 10px;
                width: 10px;
                top: 50%;
                transform: translateY(-35%);
                background: #85ff15;
                border-radius: 50%;
                margin-left: .5em;
                animation: active 2s infinite;
                opacity: .8;
                
            }
            
        }
        
         
        @keyframes active {
            50% {
                scale: .94;
                filter: drop-shadow(0 0 .4em #9bff6abc);
            }
        }
        
        @keyframes activeNoScale {
            50% {
                text-shadow: 0 0 .4em #9bff6abc;
            }
        }

        #gr {
            text-align: center;
            margin: 1.2em;
            letter-spacing: 2px;
            color: var(--accent);
            background: var(--accent-bg);
            padding: 6px;
            border-radius: 36px;
            font-weight: 800;
            backdrop-filter: blur(8px);

        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            margin: auto;
            justify-content: center;
            align-items: center;
            gap: 1em;
            z-index: 1000000;
            background: #000000c0;
            min-height: 100vh;
            min-width: 100vw;
            pointer-events: auto;
            user-select: none;
            overflow: hidden;

        }

        @keyframes scale1 {
            50% {
                scale: .75;
            }
        }

        #loader div {
            position: relative;
            font-size: 10vw;
            text-align: center;
            color: transparent;
            background: linear-gradient(90deg, rgb(0, 255, 106), rgb(0, 89, 255));
            background-clip: text;
            filter: drop-shadow(1px 2px .1em var(--loader-filter));

            &:first-child {
                animation: scale1 2s infinite;
            }

            &:nth-child(2) {
                animation: scale1 2s infinite;
                animation-delay: 1s;
            }

            &:last-child {
                animation: scale1 2s infinite;
            }
        }

        .second-header {
            display: flex;
            justify-content: space-around;
            overflow-x: hidden;
        }

        .btns {
            margin: auto;
            background: none;
            text-align: center;
            padding: 6px;
            transition: scale .1s, transform 3s cubic-bezier(0.19, 1, 0.22, 1);
            overflow: hidden;
            overflow-x: hidden;

            &:active {
                scale: .75;
            }
        }

        .btnD {
            color: #fff;
        }

        @keyframes opening {
            0% {
                transform: translate(-50%, -40%);
                opacity: .5;
            }
        }

        @keyframes closing {
            100% {
                transform: translate(-50%, -30%);
                opacity: .5;
            }
        }

        @keyframes OpenObj {
            0% {
                opacity: .5;
                scale: 0;
            }

            100% {
                opacity: 1;
                scale: 1;
            }
        }

        @keyframes CloseObj {
            0% {
                opacity: 1;
                scale: 1;
            }

            100% {
                opacity: .5;
                scale: 0;
            }
        }

        @keyframes simpleOpacity {
            0% {
                opacity: 0;
            }
        }

        .menu-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 1.5em;
            text-align: center;
            background: var(--menu-bg);
            padding: 3em;
            min-width: 50vw;
            padding-bottom: 1.5em;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            transition: opacity .5s;

            &::before {
                position: absolute;
                content: "";
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                min-height: 1000vh;
                min-width: 1000vw;
                background: var(--menu-bg-bg);
                z-index: -100;
                animation: simpleOpacity 1s cubic-bezier(0.075, 0.82, 0.165, 1);
            }

            h1 {
                padding-bottom: 1em;
                letter-spacing: 1px;
            }

            h4 {
                font-family: monospace;
                font-size: larger;
                color: var(--menu-color);
                position: relative;
                display: flex;
                flex-direction: column;

                span {
                    letter-spacing: 1.5px;
                }
            }

            button {
                background: var(--acdeac-btn);
                border: none;
                padding: 6px;
                border-radius: 24px;
                letter-spacing: 2px;
                color: #ffffff;
                filter: drop-shadow(0 4px .75em #ffffff3f);
                transition: transform .3s;
                font-family: "DejaVuSans";

                &:active {
                    transform: scale(.9);
                }
            }

            #close-btn-m {
                margin-top: 2em;
                background: #00a8c594;
            }

            span {
                font-weight: 100;
            }
        }

        #theme-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr;

        }

        #theme-container>div {
            display: flex;
            justify-content: center;
            gap: .5em;
            outline: none !important;
        }

        #burger-menu.opened-btn {
            transform: scaleY(1.75);
        }

        #burger-menu.closed-btn {
            transform: scaleY(1);
        }



        h4>input {
            margin-left: .3em;
            margin-right: .9em;
            transition: scale .2s;
            position: relative;

            &::after {
                position: absolute;
                content: '';
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 1em;
                height: 1em;
                border-radius: 50%;
                background: #fff;
                border: solid 1px currentColor;
            }

            &:active {
                scale: 1.2;
            }

            &:checked&::after {
                background: #4f6187;
            }
        }

        #alerter {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000000f3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 200000;
            padding: 2em;
            padding-top: 6em;
            box-sizing: border-box;
            display: none;
            outline: none;


            h2,
            h3,
            h6 {
                color: #fff;
                padding: 1em;
            }

            h6 {
                letter-spacing: 3px;
                font-weight: 300;
            }
        }

        #alerter h1 {
            color: var(--accent);
            margin-bottom: 0.5em;
        }

        #alerter input {
            padding: 12px;
            border-radius: 38px;
            border: 1px solid #4f6187;
            background: #2a406e;
            color: white;
            font-size: 1.2em;
            width: 80%;
            max-width: 300px;
            outline: none;
            transition: background .5s;

            &::placeholder {
                transition: letter-spacing .5s ease-in-out, color 1s ease;
                color: #999999;
            }

            &:focus {
                outline: none;

                &::placeholder {
                    letter-spacing: 2px;
                    color: #4f6187;
                }
            }

            &:placeholder-shown {
                background: var(--accent-bg);
            }


        }

        #set-group-btn {
            margin: 1em;
            padding: .5em 1.5em;
            background: var(--s-b-b);
            border-radius: 24px;
            border: none;
            transition: transform .1s, filter .2s;
            filter: drop-shadow(2px 4px 12px #0000006b);
            font-size: 1em;
            outline: none;
            user-select: none;

            &:active {
                transform: translateY(4px) scale(.95);
                filter: none;
            }
        }

        #fast-alert {
            justify-content: center;
            flex-direction: column;
            position: absolute;
            background: var(--alert-bg);
            padding: 6px calc(18px + 5vw);
            border-radius: 12px;
            box-shadow: 2px 4px .4em #00000027, inset 4px 0 12px var(--anti-shadows);
            text-align: center;
            backdrop-filter: blur(8px);
            right: 0;
            top: 15%;
            display: none;
            transition: all .5s;
            filter: drop-shadow(4px 4px 12px var(--shadows));
            z-index: 1000;

            h2 {
                color: var(--menu-color);
                font-family: monospace;
                letter-spacing: 2px;
                font-weight: 100;
                font-size: large;
            }
        }

        #empty-container {
            display: none;
            justify-content: center;
            flex-direction: row;
            color: var(--over-color);
            margin: auto;
            text-align: center;
            margin-top: 2em;
        }

        #e-c {
            display: flex;
            flex-direction: column;
            letter-spacing: 2px;
            gap: .5em;
        }

        .sad-starry {
            filter: var(--star-sh);
        }

        @keyframes flyUP {
            0% {
                transform: translateY(6px);
            }

            50% {
                opacity: 1;
                transform: translateY(0);
            }

            100% {
                transform: translateY(-12px);
                opacity: 0;
            }
        }

        @keyframes opq1 {
            0% {
                opacity: 0;
            }
        }

        @keyframes glow {
            50% {
                filter: drop-shadow(4px 4px 2em rgba(255, 217, 0, 0.45));
            }
        }

        .assistant>div {
            position: fixed;
            right: 1.5em;
            z-index: 1000;
            bottom: 1em;
            background: none;
            transition: all 1s cubic-bezier(0.77, 0, 0.175, 1);
            animation: glow 30s infinite;

            &:hover {
                scale: 1.2;
            }
        }

        .assistant-say {
            position: fixed;
            right: calc(2em + 70px);
            z-index: 1000;
            bottom: 5em;
            background: #537fdf5e;
            font-family: monospace;
            font-weight: 200;
            transition: all 1s cubic-bezier(0.77, 0, 0.175, 1);
            border-radius: 36px 36px 10px 36px;
            font-size: small;
            backdrop-filter: brightness(50%) blur(9px);
            /*overflow: scroll;*/
        }

        #ctx-assistant-say {
            padding: 16px;
        }

        #activate-ai-a {
            letter-spacing: 2px;
            transition: all .4s;
            outline: none !important;
        }

        .my-def-btns {
            padding: 3px 6px;
            border-radius: 24px;
            border: none;
            background: var(--accent);
            box-shadow: 2px 2px 6px black;
        }

        #sk {
            border-radius: 30px;
            background: #4f618738;
            margin-left: 4.5vw;
            margin-right: 4.5vw;
            padding-top: 12px;
            padding-bottom: 12px;
        }

        h3.skeleton {
            margin-top: 12px;
            margin-bottom: 26px;
        }

        h2.skeleton {
            margin-left: 15vw;
            margin-right: 15vw;
            margin-bottom: 32px;
        }

        h4.skeleton {
            margin-top: 22px;
            opacity: .8;
        }

        h6.skeleton {
            opacity: .5;
        }

        .skeleton {
            height: 1.5em;
            background: #ffffff1c;
            margin-bottom: 16px;
            border-radius: 9px;
            margin-left: 5vw;
            margin-right: 5vw;
            box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow-x: hidden;

            &::before {
                border-radius: 9px;
                position: absolute;
                content: "";
                background: var(--runner-sk);
                left: 0;
                top: 50%;
                transform: translate(-150%, -50%);
                height: 90%;
                width: 30%;

                animation: skelet 2s infinite ease-in-out;

            }

        }

        /*.lesson-row {
            position: relative;
            &::before {
                position: absolute;
                right: 1em;
                top: 50%;
                content:  "▼";
                transform: translateY(-8px) scaleX(1.2);
                padding: 4px;
                opacity: .7;
            }
        }*/
        
        

        .changing-rooms {
            background: var(--ch-room-bg);
            padding: 4px;
            padding-top: 2px;
            text-wrap: nowrap;
            border-radius: 8px;
            position: relative;

            /*&::before {
                position: absolute;
                content: "i";
                color: rgb(255, 230, 0);
                font-style: italic;
                font-size: smaller;
                right: -8px;
                top: 0px;
                
            }*/
        }

        @keyframes skelet {
            0% {
                left: 0;
            }

            50% {
                left: 150%;
            }

            100% {
                left: 0;
            }
        }

        @keyframes nothingFly {
            0% {
                transform: translateY(10%);
                opacity: .05;
            }
        }
    </style>

    <div id="loader">
        <div>●</div>
        <div>●</div>
        <div>●</div>
    </div>

    <div class="menu-display" id="user-menu-display">
        <h1>Меню</h1>
        <h4>Айди пользователя: <span id="tg-id-menu"></span></h4>
        <h4>Группа: <span id="group-name-menu"></span><button onclick="openGroupChangeModal()" style="outline: none;">Изменить</button></h4>
        <h4>Тема:<br>
            <div id="theme-container">
                <div><input type="radio" name="theme" id="dark-theme" checked style="outline: none;"><span id="d-s-t">Dark</span></div>
                <div><input type="radio" name="theme" id="light-theme" style="outline: none;"><span id="l-s-t">Light</span></div>
            </div>
        </h4>
        <h4>Персональный помощник <button id="activate-ai-a"></button></h4>
        <button onclick="closee('user-menu-display')" id="close-btn-m">Закрыть</button>
    </div>

    <div id="alerter">

    </div>

    <div id="fast-alert">
        <h2>Обновляем данные</h2>
    </div>

    <header>
        <h1>Расписание занятий</h1>
        <h5 id="date-time"></h5>
    </header>

    <main>
        <div class="second-header">
            <div class="btns" id="burger-menu" onclick='openn("user-menu-display", "flex")'><svg
                    xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                    <title>Menu-burger-horizontal SVG Icon</title>
                    <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                        stroke-width="2" d="M3 6h18M3 12h18M3 18h18" />
                </svg></div>
            <div id="gr"></div>
            <div class="btns" id="upd-b"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24">
                    <title>Restart SVG Icon</title>
                    <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                        stroke-width="2">
                        <path d="M12 3a9 9 0 1 1-5.657 2" />
                        <path d="M3 4.5h4v4" />
                    </g>
                </svg></div>
        </div>
        <div class="days">
            <ul>
                <li class="btnD">ПН</li>
                <li class="btnD">ВТ</li>
                <li class="btnD">СР</li>
                <li class="btnD">ЧТ</li>
                <li class="btnD">ПТ</li>
                <li class="btnD">СБ</li>

    <script>
        const assistants = document.querySelector(".assistant");
        let assistant = document.getElementById("default-assistant");


        Array.from(assistants.children).forEach((assist) => {
            //console.log(assist);
            if (assist === assistant) {
                assist.style.display = "block";
            } else {
                assist.style.display = "none";
            }
        });

        const message = document.getElementById("ctx-assistant-say");
        let msgS = [
            `                <h1>Привет!</h1>
                <p>Я твой напарник - Starry</p>`,
            `  
                <p>Теперь мы будем вместе</p>`,
            `
                <p>Моя главная задача - помогать тебе с учебой</p>`,
        ];

        timeouts = [];

        message.style.display = "none";
        const initialDelay = setTimeout(function () {
            message.style.display = "block";
            for (let m = 0; m < msgS.length; m++) {
                let t = setTimeout(function () {
                    message.innerHTML = msgS[m];
                }, 5000 * (m));
                timeouts.push(t);

            }
        }, 2000);

        timeouts.push(initialDelay);

        function stopAll() {
            timeouts.forEach(t => clearTimeout(t));
            message.style.display = "none";
            //console.log("Цикл остановлен");
        }

        setTimeout(() => {
            message.style.display = "none";
        }, 5000 * (msgS.length + 1));

        const btnAI = document.getElementById("activate-ai-a");
        const assistantBlock = document.querySelector(".assistant");
        const assistantSay = document.querySelector(".assistant-say");

        function initAI() {
            const storedState = localStorage.getItem("isActiveAI");
            const isActive = storedState === null ? true : storedState === 'true';

            applyAIState(isActive);
        }

        function applyAIState(isActive) {
            const stateStr = isActive ? 'true' : 'false';
            localStorage.setItem("isActiveAI", stateStr);

            btnAI.innerHTML = isActive ? "<b>ВЫКЛ</b>" : "<b>ВКЛ</b>";

            if (isActive) {
                assistantBlock.style.display = "block";
                assistantSay.style.display = "block";
            } else {
                assistantBlock.style.display = "none";
                assistantSay.style.display = "none";
            }
        }

        btnAI.onclick = function () {
            const currentState = localStorage.getItem("isActiveAI") === 'true';
            haptic.notificationOccurred("success");
            applyAIState(!currentState);
        };

        initAI();
        const container = document.getElementById("schedule-container");

        var loader = document.getElementById("loader");
        loader.style.display = "flex";

        const tg = window.Telegram.WebApp;
        tg.ready();
        const haptic = tg.HapticFeedback;

        var d = new Date();
        n = d.getDay();
        m = d.getMonth();
        dt = d.getDate();
        days = { 1: "Понедельник", 2: "Вторник", 3: "Среда", 4: "Четверг", 5: "Пятница", 6: "Суббота", 7: "Воскресенье", 0: "Воскресенье" }, months = { 0: "января", 1: "февраля", 2: "марта", 3: "апреля", 4: "мая", 5: "июня", 6: "июля", 7: "августа", 8: "сентября", 9: "октября", 10: "ноября", 11: "декабря" }, dayCall = days[n] ?? "Воскресенье", full = dayCall + ", " + dt + " " + (months[m] ?? 0);
        document.getElementById("date-time").innerHTML = full;
        daysShort = { 1: "ПН", 2: "ВТ", 3: "СР", 4: "ЧТ", 5: "ПТ", 6: "СБ", 7: "ВС", 0: "ВС" }
        let s = false;
        let nowBtn;
        let tommorrow = new Date();
        tommorrow.setDate(dt + 1);


        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            var userId = tg.initDataUnsafe.user.id;
        };

        function getSchedule1(reqNeed = false) {
            var ttl = 30 * 60 * 1000;
            var cachedData = localStorage.getItem("schedule");
            var dataLastUpd = localStorage.getItem("updated_at");


            if (userId) {

                const econt = document.getElementById("empty-container");
                if (econt) {
                    econt.style.display = "none";
                }
                container.innerHTML = `
    <div id="sk"><h2 class="skeleton"></h2>
            <h3 class="skeleton"></h3>
            <h4 class="skeleton"></h4>
            <h6 class="skeleton"></h6>

            <h4 class="skeleton"></h4>
            <h6 class="skeleton"></h6>

            <h4 class="skeleton"></h4>
            <h6 class="skeleton"></h6>
            </div>`;
                m = "";
                for (let i = 0; i < (userId.toString().length - 4); i++) {
                    m += "●";

                    lessonH.forEach((ls) => {
                        const times = ls.querySelectorAll(".time");
                        times.forEach((timee) => {
                            timeeText = timee.innerHTML.toString().trim();

                            const timeNow = new Date();
                            const nowH = timeNow.getHours();
                            const nowM = timeNow.getMinutes();
                            const HRSMINS = [timeeText.split("-")[0].split(":"), timeeText.split("-")[1].split(":")];



                            D1.setHours(HRSMINS[0][0]);
                            D1.setMinutes(HRSMINS[0][1]);

                            D2.setHours(HRSMINS[1][0]);
                            D2.setMinutes(HRSMINS[1][1]);


                            if (timeNow >= D1 && timeNow <= D2) {

        function cleanDaySchedule(dayElement) {
            const lessonsData = {};
            const dayNameEl = dayElement.querySelector(".day-name");

            const lessonHeaders = dayElement.querySelectorAll(".lesson");

            lessonHeaders.forEach((header) => {
                //const Teacher = header.parentElement.parentElement.querySelector(".teacher");


                const lessonNum = header.textContent.trim();


                const timeEl = header.nextElementSibling;
                const timeText = timeEl?.classList.contains("time") ? timeEl.textContent.trim() : "";


                const subjectEl = timeEl?.nextElementSibling;
                const roomEl = subjectEl?.nextElementSibling;

                const subjectName = subjectEl?.classList.contains("subject") ? subjectEl.textContent.trim() : "";
                let roomText = roomEl?.classList.contains("room") ? roomEl.textContent.trim() : "";

                const Teacher = roomEl?.nextElementSibling;

                let teacherText = Teacher?.classList.contains("teacher") ? Teacher.textContent.trim() : "Не указано";

                roomText = roomText.replace(/[()]/g, "");

                const key = `${lessonNum}_${timeText}_${subjectName}`;

                if (!lessonsData[key]) {
                    lessonsData[key] = {
                        num: lessonNum,
                        time: timeText,
                        name: subjectName,
                        rooms: roomText ? [roomText] : [],
                        teacher: teacherText
                    };
                } else {
                    if (roomText && !lessonsData[key].rooms.includes(roomText)) {
                        lessonsData[key].rooms.push(roomText);
                    }
                }
            });

            let newHTML = `<h3 class="day-name">${dayNameEl ? dayNameEl.innerHTML : ""}</h3>`;

            Object.values(lessonsData).forEach(l => {
                const roomsDisplay = l.rooms.length > 0
                    ? ` <span class="room">(${l.rooms.join(' / ')})</span>`
                    : "";

                newHTML += `
            <div class="lesson-row">
                <h4 class="lesson">${l.num}</h4>
                <h6 class="time">${l.time}</h6>
                <button class="list-btn"></button>
                <span class="subject">${l.name}</span>${roomsDisplay}
                <h5 class="teacher">${l.teacher}</h5>
            </div>
        `;



            });

            dayElement.innerHTML = newHTML;

            teacherHide(dayElement);
        }

        function toBtoa(str) {
            const utf8Bytes = encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => {
                return String.fromCharCode('0x' + p1);
            });

            const b64 = btoa(utf8Bytes);

            return b64.replace(/\//g, '_').replace(/\+/g, '-').replace(/=+$/, '');

        }
